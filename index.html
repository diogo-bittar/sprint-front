<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera UI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="flex.css">
</head>
<body>

<div class="container">

  <!-- CAMERA -->
  <div class="phone">
    <div class="camera">

      <div class="top-bar">
        <span>9:41</span>
        <div class="top-icons">
          <span>⚡</span>
          <span class="ai">AI</span>
        </div>
      </div>

      <div class="viewfinder">
        <div class="tag">Night Mode</div>
        <div class="hint">Smart HDR recomendado</div>
        <div class="focus-box">+</div>
      </div>

      <div class="bottom">

        <div class="mode-main">
          <span class="active">PHOTO</span>
          <span>VIDEO</span>
        </div>

        <div class="mode-sub">
          <span>PRO</span>
          <span>PORTRAIT</span>
          <span>NIGHT</span>
        </div>

        <div class="controls">
          <div class="gallery"></div>
          <div class="capture"></div>
          <div class="switch">⟳</div>
        </div>

      </div>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="phone">
    <div class="header">
      <h2>Gallery</h2>
    </div>

    <div class="tabs">
      <span class="active">All</span>
      <span>Photos</span>
      <span>Videos</span>
    </div>

    <div class="grid">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="phone">
    <div class="header">
      <h2>Settings</h2>
    </div>

    <div class="settings">

      <div class="item">
        <span>Resolution</span>
        <button>12MP</button>
      </div>

      <div class="item">
        <span>Grid Overlay</span>
        <div class="toggle"></div>
      </div>

      <div class="item">
        <span>Dark Mode</span>
        <div class="toggle active"></div>
      </div>

      <div class="item">
        <span>AI Features</span>
        <div class="toggle active"></div>
      </div>

    </div>

    <div class="about">Camera App v1.0</div>
  </div>

</div>

</body>
</html>
